name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시에 같은 브랜치에 여러 워크플로가 돌지 않도록 제한
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  #  PR: 프론트엔드 lint + 빌드 체크
  # ===========================================================================
  frontend-check:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: ESLint 검사
        run: npx eslint src --ext .js,.jsx --max-warnings 0
        continue-on-error: true  # 경고가 있어도 빌드는 진행

      - name: 프로덕션 빌드 테스트
        run: npm run build
        env:
          CI: false  # CRA의 warning → error 변환 방지
          REACT_APP_API_URL: http://localhost:8000

  # ===========================================================================
  #  PR: 백엔드 lint + 타입 체크
  # ===========================================================================
  backend-check:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format 체크
        run: ruff format --check app/

  # ===========================================================================
  #  main 머지: 프론트엔드 → Vercel 자동 배포
  # ===========================================================================
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vercel CLI 설치
        run: npm install -g vercel@latest

      - name: Vercel 배포
        run: vercel deploy --prod --yes
        working-directory: client
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ===========================================================================
  #  main 머지: 백엔드 Docker 빌드 + 배포
  # ===========================================================================
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 백엔드 Docker 이미지 빌드 + 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/the-circle-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/the-circle-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Railway CLI를 통한 배포 (Railway 사용 시)
      # AWS ECS 사용 시 이 step을 교체하세요
      - name: Railway 배포
        run: |
          npm install -g @railway/cli
          railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Railway를 사용하지 않으면 이 step 전체를 주석 처리하세요

  # ===========================================================================
  #  docker/comfyui 변경 시에만: RunPod 이미지 재빌드 + 엔드포인트 업데이트
  # ===========================================================================
  deploy-runpod:
    name: Deploy ComfyUI → RunPod
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    # docker/comfyui 경로 변경 여부 확인
    outputs:
      comfyui_changed: ${{ steps.check_changes.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 이전 커밋과 비교하기 위해

      - name: ComfyUI 파일 변경 여부 확인
        id: check_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker/comfyui/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "docker/comfyui 변경 감지 — RunPod 재배포 진행"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "docker/comfyui 변경 없음 — RunPod 재배포 건너뜀"
          fi

      - name: Docker Buildx 설정
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ComfyUI Docker 이미지 빌드 + 푸시
        if: steps.check_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./docker/comfyui
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/the-circle-comfyui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/the-circle-comfyui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: RunPod 엔드포인트 이미지 업데이트
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.runpod.io/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -d "{\"query\": \"mutation { saveEndpoint(input: { id: \\\"${{ secrets.RUNPOD_ENDPOINT_ID }}\\\", imageName: \\\"${{ secrets.DOCKERHUB_USERNAME }}/the-circle-comfyui:${{ github.sha }}\\\" }) { id } }\"}"
