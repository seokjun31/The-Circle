# =============================================================================
#  The Circle — 프로덕션 Docker Compose
#
#  실행:   docker compose up -d
#  종료:   docker compose down
#  로그:   docker compose logs -f backend
#  재빌드: docker compose up -d --build
#
#  로컬 개발은 docker-compose.dev.yml 사용 (DB + Redis만 실행)
# =============================================================================

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: the_circle
      POSTGRES_USER: ${DB_USER:-circle_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-circle_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-circle_user} -d the_circle"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 (Celery 브로커 + 캐시) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # ── FastAPI 백엔드 ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-circle_user}:${DB_PASSWORD:-circle_pass}@db:5432/the_circle
      REDIS_URL: redis://redis:6379/0
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Celery Worker (비동기 렌더링 작업) ────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-circle_user}:${DB_PASSWORD:-circle_pass}@db:5432/the_circle
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  # ── React 프론트엔드 (Nginx) ───────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
